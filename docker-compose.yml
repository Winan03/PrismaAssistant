services:
  prisma_assistant:
    build: .
    container_name: prisma_assistant
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    env_file:
      - .env
    volumes:
      # Persiste la base de datos vectorial entre reinicios
      - ./chroma_db:/app/chroma_db
      # Persiste logs
      - ./logs:/app/logs
      # Persiste sesiones de usuario
      - ./sessions:/app/.cache/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
