<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cribado de Artículos — PRISMA Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0f766e; --primary-light: #14b8a6; --primary-bg: #f0fdfa;
      --bg: #f8fafb; --card: #ffffff; --text: #1e293b; --text-muted: #64748b;
      --border: #e2e8f0; --radius: 14px;
      --red: #ef4444; --red-bg: #fef2f2; --green: #10b981; --green-bg: #ecfdf5;
      --blue: #3b82f6; --blue-bg: #eff6ff; --amber: #f59e0b; --amber-bg: #fffbeb;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .app-layout { display: flex; flex-direction: column; height: 100vh; }
    .main-content { flex: 1; display: flex; overflow: hidden; }
    .table-area { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .sidebar { width: 280px; min-width: 280px; background: var(--card); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── Navbar ── */
    .navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-left { display: flex; align-items: center; gap: 16px; }
    .navbar-brand { font-weight: 800; font-size: 1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .navbar-title { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .navbar-sub { font-size: 0.7rem; color: var(--text-muted); }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .counter-box { background: var(--green-bg); border: 1px solid #a7f3d0; border-radius: 10px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; }
    .counter-num { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
    .counter-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .btn-finish { display: flex; align-items: center; gap: 8px; background: var(--primary); color: #fff; padding: 10px 20px; border: none; border-radius: 10px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-finish:hover { background: #0d5f58; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,118,110,0.3); }
    .btn-finish:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Sidebar ── */
    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 700; margin-bottom: 0.6rem; }
    .col-btn { width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; color: var(--text); background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; text-align: left; display: flex; align-items: center; font-family: inherit; }
    .col-btn:hover { background: var(--primary-bg); border-color: var(--primary-light); }
    .col-btn.active { background: var(--blue-bg); border-color: var(--blue); color: #1d4ed8; }
    .col-btn i { width: 18px; margin-right: 8px; font-size: 0.75rem; }

    /* Agent status */
    .agent-box { margin-top: auto; background: var(--bg); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
    .agent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .agent-label { font-size: 0.7rem; font-weight: 700; color: var(--text); }
    .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }
    .agent-status { font-size: 0.65rem; color: var(--text-muted); }
    .agent-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .agent-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s; border-radius: 2px; }

    /* ── Paper Cards ── */
    .paper-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; transition: all 0.2s ease; overflow: hidden; display: flex; }
    .paper-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .status-bar { width: 5px; background: #e2e8f0; flex-shrink: 0; }
    .paper-card.included .status-bar { background: var(--green); }
    .paper-card.excluded .status-bar { background: var(--red); }
    .paper-card.excluded { opacity: 0.5; }

    /* Relevance badges */
    .relevance-badge { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }
    .relevance-high { background: var(--green-bg); color: #065f46; border: 1px solid #a7f3d0; }
    .relevance-medium { background: var(--amber-bg); color: #92400e; border: 1px solid #fde68a; }
    .relevance-low { background: var(--red-bg); color: #991b1b; border: 1px solid #fecaca; }

    /* AI cells */
    .ai-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
    .ai-cell { background: #fafbfc; padding: 14px 16px; font-size: 0.82rem; line-height: 1.6; color: #475569; word-wrap: break-word; max-height: 400px; overflow-y: auto; }
    .ai-cell h5 { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; letter-spacing: 0.3px; }

    /* Buttons include/exclude */
    .btn-include, .btn-exclude { padding: 10px 20px; border-radius: 10px; font-size: 0.78rem; font-weight: 700; border: 2px solid; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; background: #fff; font-family: inherit; }
    .btn-include { border-color: #a7f3d0; color: #065f46; }
    .btn-include:hover { background: var(--green-bg); }
    .btn-exclude { border-color: #fecaca; color: #991b1b; }
    .btn-exclude:hover { background: var(--red-bg); }

    /* Meta badges */
    .meta-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; background: #f1f5f9; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; }
    .pdf-badge-ok { background: var(--green-bg); color: #065f46; border: 1px solid #a7f3d0; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; }
    .pdf-badge-missing { background: var(--amber-bg); color: #92400e; border: 1px solid #fde68a; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; }
    .btn-upload-sm { background: #fff; border: 1px solid #c7d2fe; color: #4f46e5; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn-upload-sm:hover { background: #eef2ff; }
    .btn-source { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; border: 1px solid #c7d2fe; color: #4f46e5; font-size: 0.65rem; font-weight: 700; text-decoration: none; transition: all 0.15s; }
    .btn-source:hover { background: #eef2ff; }

    /* Load more */
    .btn-loadmore { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 14px 32px; font-weight: 700; font-size: 0.85rem; cursor: pointer; color: var(--text); transition: all 0.2s; font-family: inherit; }
    .btn-loadmore:hover { border-color: var(--primary-light); background: var(--primary-bg); color: var(--primary); }

    /* Loading */
    .loading-indicator { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin { animation: spin 1s linear infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Modal */
    .modal { display:none; position:fixed; z-index:50; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); }
    .modal-content { background:#fff; margin:10% auto; border-radius:16px; width:460px; box-shadow:0 20px 50px rgba(0,0,0,0.15); overflow:hidden; }
    .hidden { display: none !important; }
    
    /* Details/Summary */
    details summary { list-style: none; }
    details summary::-webkit-details-marker { display: none; }

    /* Colors for Tailwind-style classes used in JS */
    .text-blue-500 { color: #3b82f6; }
    .text-emerald-600 { color: #059669; }
    .text-purple-500 { color: #a855f7; }
    .text-orange-500 { color: #f97316; }
    .text-indigo-500 { color: #6366f1; }
    .text-yellow-500 { color: #eab308; }
    .text-red-500 { color: #ef4444; }
    .text-slate-500 { color: #64748b; }
    .text-indigo-600 { color: #4f46e5; }
    .text-slate-400 { color: #94a3b8; }
    .text-amber-600 { color: #d97706; }
    .text-slate-700 { color: #334155; }
    .text-slate-800 { color: #1e293b; }
    .text-rose-600 { color: #e11d48; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .navbar-right { gap: 8px; }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-left">
        <a href="/" class="navbar-brand"><i class="fas fa-flask"></i> PRISMA</a>
        <div>
          <div class="navbar-title">Cribado Manual de Artículos</div>
          <div class="navbar-sub" id="total-articles-count">Cargando...</div>
        </div>
      </div>
      <div class="navbar-right">
        <div class="counter-box">
          <span class="counter-num" id="count-included">0</span>
          <span class="counter-label">Incluidos</span>
        </div>
        <button onclick="submitScreening()" class="btn-finish">
          <i class="fas fa-arrow-right"></i> Finalizar Revisión
        </button>
      </div>
    </nav>

    <div class="main-content">
      <!-- ── Articles Area ── -->
      <div class="table-area">
        <div style="max-width:960px;margin:0 auto" id="articles-list">
          <div class="loading-indicator" id="loading-indicator">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block"></i>
            <p style="font-size:0.9rem;font-weight:600">Cargando artículos...</p>
          </div>
        </div>

        <div id="pagination-controls" class="hidden" style="margin-top:2rem;text-align:center">
          <button id="btn-load-more" onclick="loadMore()" class="btn-loadmore">
            <i class="fas fa-plus-circle" style="margin-right:6px"></i> Ver más artículos
          </button>
        </div>
      </div>

      <!-- ── Sidebar ── -->
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Herramientas</div>
          <button onclick="translateAllAbstracts()" id="btn-translate-all" class="col-btn">
            <i class="fas fa-language"></i> Traducir Abstracts
          </button>
        </div>

        <div class="sidebar-section" id="ai-columns-sidebar">
          <div class="sidebar-label">Columnas IA</div>
          <div id="dynamic-buttons-container">
            <div style="text-align:center;padding:12px;color:var(--text-muted);font-size:0.7rem;font-style:italic">
              <i class="fas fa-wand-magic-sparkles" style="margin-right:4px"></i> Configurando matriz...
            </div>
          </div>
        </div>

        <div class="agent-box">
          <div class="agent-header">
            <span class="agent-label">Agente IA</span>
            <div class="agent-dot" id="agent-status-dot"></div>
          </div>
          <div class="agent-status" id="queue-status">Inactivo</div>
          <div class="agent-bar">
            <div class="agent-bar-fill" style="width:0%" id="queue-progress"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Modal Upload PDF ── -->
    <div id="uploadModal" class="modal">
      <div class="modal-content">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)">
          <div>
            <h3 style="font-size:0.95rem;font-weight:700">Subir PDF Manualmente</h3>
            <p id="modal-article-title" style="font-size:0.7rem;color:var(--primary);font-weight:600;margin-top:2px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></p>
          </div>
          <button onclick="closeUploadModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div style="padding:2rem">
          <div id="upload-form-area" style="text-align:center">
            <label for="pdfFile" style="cursor:pointer;display:block">
              <div style="border:2px dashed var(--border);border-radius:16px;padding:3rem;transition:all 0.2s">
                <i id="upload-icon" class="fas fa-cloud-upload-alt" style="font-size:2.5rem;color:#cbd5e1;margin-bottom:12px;display:block"></i>
                <p id="upload-text" style="font-weight:600;font-size:0.85rem;color:var(--text)">Haz clic o arrastra el PDF aquí</p>
                <p style="font-size:0.65rem;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:1px;font-weight:700">Solo archivos .pdf</p>
              </div>
              <input type="file" id="pdfFile" style="display:none" accept="application/pdf" onchange="handleFileSelect(this)">
            </label>
          </div>
          <div id="upload-loading" class="hidden" style="padding:2.5rem 0;text-align:center">
            <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>
            <p style="font-weight:700;color:var(--primary);font-size:0.85rem">Procesando PDF...</p>
            <p style="font-size:0.7rem;color:var(--text-muted);margin-top:4px">Extrayendo texto para análisis RAG</p>
          </div>
        </div>
        <div id="modal-footer" style="padding:12px 20px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px">
          <button onclick="closeUploadModal()" style="padding:8px 16px;border:none;background:none;color:var(--text-muted);font-weight:700;font-size:0.8rem;cursor:pointer;border-radius:8px;font-family:inherit">Cancelar</button>
          <button id="btn-do-upload" onclick="doUpload()" disabled style="padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:0.8rem;cursor:pointer;font-family:inherit;opacity:0.5">Confirmar</button>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- 📦 DATOS JSON DEL SERVIDOR (INYECTADOS POR JINJA2) -->
    <!-- ============================================================ -->
    <script id="articles-data" type="application/json">
{{ articles | tojson | safe }}
  </script>
    <script id="column-config-data" type="application/json">
{{ column_config | tojson | safe }}
  </script>

    <!-- ============================================================ -->
    <!-- 🚀 CÓDIGO JAVASCRIPT PRINCIPAL -->
    <!-- ============================================================ -->
    <script>
      (function () {
        'use strict';

        let articlesData = [];
        let activeColumns = [];
        let columnConfig = null;
        let taskQueue = [];
        let activeTasks = 0;
        const MAX_CONCURRENT_TASKS = 3;
        let totalTasks = 0;
        let completedTasks = 0;
        let decisions = new Set();
        const PAGE_SIZE = 15;
        let visibleCount = 0;
        const SESSION_ID = "{{ session_id }}";
        const RESEARCH_QUESTION = "{{ question }}";

        function escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        function loadArticles() {
          try {
            const dataElement = document.getElementById('articles-data');
            const configElement = document.getElementById('column-config-data');
            if (!dataElement || !configElement) throw new Error("Faltan datos del servidor");
            articlesData = JSON.parse(dataElement.textContent.trim());
            columnConfig = JSON.parse(configElement.textContent.trim());
            if (!articlesData || !Array.isArray(articlesData)) throw new Error("Datos no válidos");
            renderDynamicButtons();
            document.getElementById('total-articles-count').textContent = `${articlesData.length} de ${articlesData.length} artículos`;
            return true;
          } catch (e) {
            console.error("❌ Error:", e);
            showError(e.message);
            return false;
          }
        }

        function renderDynamicButtons() {
          const container = document.getElementById('dynamic-buttons-container');
          if (!container || !columnConfig || !columnConfig.columnas) return;
          container.innerHTML = '';
          columnConfig.columnas.forEach(col => {
            const btn = document.createElement('button');
            btn.id = `btn-${col.key}`;
            btn.className = 'col-btn';
            btn.onclick = () => addColumn(col.key);
            const colors = { 'summary':'text-blue-500','objectives':'text-emerald-600','methodology':'text-purple-500','subject':'text-orange-500','variables':'text-indigo-500','findings':'text-yellow-500','limitations':'text-red-500' };
            const cc = colors[col.key] || 'text-slate-500';
            btn.innerHTML = `<i class="fas fa-${col.icon||'robot'} ${cc}"></i> ${col.label}`;
            container.appendChild(btn);
          });
          if (columnConfig.dominio) {
            const badge = document.createElement('div');
            badge.style.cssText = 'margin-top:12px;padding:6px 10px;background:var(--blue-bg);border:1px solid #bfdbfe;border-radius:8px;font-size:0.6rem;color:#1d4ed8;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:0.5px';
            badge.innerHTML = `<i class="fas fa-microscope" style="margin-right:4px"></i> MATRIZ: ${columnConfig.dominio}`;
            container.appendChild(badge);
          }
        }

        function showError(message) {
          document.getElementById('articles-list').innerHTML = `
            <div style="background:var(--red-bg);border:2px solid #fecaca;border-radius:14px;padding:2.5rem;text-align:center;max-width:500px;margin:2rem auto">
              <i class="fas fa-exclamation-circle" style="font-size:2.5rem;color:var(--red);margin-bottom:12px;display:block"></i>
              <h2 style="font-weight:700;color:#991b1b;margin-bottom:8px">Error al Cargar</h2>
              <p style="color:#b91c1c;font-size:0.85rem;margin-bottom:16px">${escapeHtml(message)}</p>
              <button onclick="location.reload()" style="background:var(--red);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit">Recargar</button>
            </div>`;
        }

        function renderArticles() {
          const container = document.getElementById('articles-list');
          const li = document.getElementById('loading-indicator');
          if (li) li.remove();
          if (!articlesData || articlesData.length === 0) {
            container.innerHTML = `
              <div style="background:var(--amber-bg);border:2px solid #fde68a;border-radius:14px;padding:2.5rem;text-align:center;max-width:500px;margin:2rem auto">
                <i class="fas fa-inbox" style="font-size:2.5rem;color:var(--amber);margin-bottom:12px;display:block"></i>
                <h2 style="font-weight:700;color:#92400e">No hay artículos para revisar</h2>
                <p style="color:#a16207;font-size:0.85rem;margin-top:6px">Intenta ajustar los filtros de búsqueda</p>
              </div>`;
            return;
          }
          articlesData.forEach((article, index) => {
            const card = createArticleCard(article, index);
            card.style.display = 'none';
            container.appendChild(card);
          });
          loadMore();
        }

        window.loadMore = function () {
          const total = articlesData.length;
          const start = visibleCount;
          const end = Math.min(visibleCount + PAGE_SIZE, total);
          for (let i = start; i < end; i++) {
            const card = document.getElementById(`card-${i}`);
            if (card) { card.style.display = 'flex'; card.classList.add('fade-in'); }
          }
          visibleCount = end;
          document.getElementById('total-articles-count').textContent = `${visibleCount} de ${total} artículos`;
          const controls = document.getElementById('pagination-controls');
          if (visibleCount >= total) controls.classList.add('hidden');
          else controls.classList.remove('hidden');
          if (activeColumns.length > 0) {
            activeColumns.forEach(col => enqueueVisibleTasks(col, start, end));
          }
        };

        function enqueueVisibleTasks(colName, start, end) {
          const meta = getColumnMeta(colName);
          for (let i = start; i < end; i++) {
            const article = articlesData[i];
            const container = document.getElementById(`ai-container-${i}`);
            if (!container) continue;
            container.classList.remove('hidden');
            const cellId = `cell-${i}-${colName}`;
            if (!document.getElementById(cellId)) {
              const div = document.createElement('div');
              div.className = 'ai-cell fade-in'; div.id = cellId;
              if (!article.is_pdf_downloaded) {
                div.innerHTML = `<h5><i class="${meta.icon} ${meta.color}"></i> ${meta.title}</h5><div class="text-amber-600" style="font-size:0.7rem;background:var(--amber-bg);padding:6px 8px;border-radius:6px;border:1px solid #fde68a;margin-top:4px"><i class="fas fa-upload"></i> Subir PDF para analizar</div>`;
                container.appendChild(div); continue;
              }
              div.innerHTML = `<h5><i class="${meta.icon} ${meta.color}"></i> ${meta.title}</h5><div class="text-slate-400 animate-pulse" style="font-size:0.7rem;display:flex;align-items:center;gap:6px"><i class="fas fa-circle-notch fa-spin"></i> En cola...</div>`;
              container.appendChild(div);
            }
            if (!article.ai_data?.[colName]) {
              taskQueue.push({ type: 'column', articleId: i, columnName: colName, cellId: cellId });
              totalTasks++;
            }
          }
          processQueue();
        }

        function createArticleCard(article, index) {
          const card = document.createElement('div');
          card.className = 'paper-card fade-in'; card.id = `card-${index}`;
          const percent = Math.round((article.similarity || 0) * 100);
          let rc = 'relevance-low', ri = '❌';
          if (percent >= 85) { rc = 'relevance-high'; ri = '✅'; }
          else if (percent >= 70) { rc = 'relevance-medium'; ri = '⚠️'; }
          const title = escapeHtml(article.title || 'Sin título');
          const year = escapeHtml(String(article.year || 'N/D'));
          const authors = Array.isArray(article.authors) ? article.authors.slice(0,2).map(a=>escapeHtml(a)).join(', ') : escapeHtml(String(article.authors||''));
          const journal = article.journal ? escapeHtml(article.journal) : '';
          const abstract = escapeHtml(article.abstract || 'Abstract no disponible');
          const url = article.url || article.pdf_url || article.link || '';
          let pdfBadge = '';
          if (article.is_pdf_downloaded) {
            pdfBadge = `<span id="pdf-badge-container-${index}" class="pdf-badge-ok"><i class="fas fa-file-pdf"></i> PDF LISTO</span>`;
          } else {
            pdfBadge = `<div id="pdf-badge-container-${index}" style="display:flex;align-items:center;gap:6px">
              <span class="pdf-badge-missing"><i class="fas fa-exclamation-triangle"></i> SIN PDF</span>
              <button onclick="openUploadModal(${index})" class="btn-upload-sm"><i class="fas fa-upload"></i> SUBIR</button>
            </div>`;
          }
          const urlBtn = url ? `<a href="${escapeHtml(url)}" target="_blank" class="btn-source"><i class="fas fa-external-link-alt"></i> FUENTE</a>` : '';
          card.innerHTML = `
            <div class="status-bar"></div>
            <div style="width:100%">
              <div style="padding:20px">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px">
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
                      <span style="flex-shrink:0;min-width:32px;height:32px;border-radius:8px;background:var(--primary-bg);border:1.5px solid var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:var(--primary);line-height:1">#${index + 1}</span>
                      <h3 style="font-size:1rem;font-weight:700;line-height:1.4;color:var(--text);margin:0">${title}</h3>
                    </div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px">
                      <span class="meta-badge"><i class="fas fa-calendar"></i> ${year}</span>
                      <span style="font-size:0.75rem;color:var(--text-muted)"><i class="fas fa-users" style="margin-right:3px"></i>${authors}</span>
                      ${journal ? `<span style="font-size:0.7rem;color:var(--text-muted);font-style:italic">${journal}</span>` : ''}
                      <span class="relevance-badge ${rc}">${ri} ${percent}%</span>
                    </div>
                    <details>
                      <summary style="font-size:0.78rem;color:var(--primary);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;width:fit-content;user-select:none">
                        <i class="fas fa-chevron-right" style="font-size:0.6rem;transition:transform 0.2s"></i> Ver Abstract
                      </summary>
                      <div style="margin-top:10px;font-size:0.82rem;color:#475569;line-height:1.6;padding-left:14px;border-left:3px solid var(--border)">${abstract}<div id="translation-box-${index}" class="hidden"></div></div>
                    </details>
                    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">${pdfBadge} ${urlBtn}</div>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:8px;min-width:120px">
                    <button onclick="setDecision(${index},'included')" class="btn-include"><i class="fas fa-check"></i> Incluir</button>
                    <button onclick="setDecision(${index},'excluded')" class="btn-exclude"><i class="fas fa-times"></i> Excluir</button>
                  </div>
                </div>
              </div>
              <div id="ai-container-${index}" class="ai-container hidden"></div>
            </div>`;
          return card;
        }

        function getColumnMeta(col_key) {
          if (!columnConfig || !columnConfig.columnas) return { title: col_key, icon: 'fas fa-robot', color: 'text-slate-500' };
          const col = columnConfig.columnas.find(c => c.key === col_key);
          if (!col) return { title: col_key, icon: 'fas fa-robot', color: 'text-slate-500' };
          const colors = { 'summary':'text-blue-500','objectives':'text-emerald-600','methodology':'text-purple-500','subject':'text-orange-500','variables':'text-indigo-500','findings':'text-yellow-500','limitations':'text-red-500' };
          return { title: col.label, icon: `fas fa-${col.icon||'robot'}`, color: colors[col_key]||'text-slate-500' };
        }

        window.addColumn = function (colName) {
          if (activeColumns.includes(colName)) return;
          activeColumns.push(colName);
          const btn = document.getElementById(`btn-${colName}`);
          if (btn) { btn.classList.add('active'); btn.onclick = null; btn.innerHTML += ' <i class="fas fa-check" style="margin-left:auto"></i>'; }
          for (let i = 0; i < visibleCount; i++) {
            const container = document.getElementById(`ai-container-${i}`);
            if (!container) continue;
            container.classList.remove('hidden');
            const meta = getColumnMeta(colName);
            const cellId = `cell-${i}-${colName}`;
            if (document.getElementById(cellId)) continue;
            const div = document.createElement('div');
            div.className = 'ai-cell fade-in'; div.id = cellId;
            div.innerHTML = `<h5><i class="${meta.icon} ${meta.color}"></i> ${meta.title}</h5><div class="text-slate-400 animate-pulse" style="font-size:0.7rem;display:flex;align-items:center;gap:6px"><i class="fas fa-circle-notch fa-spin"></i> En cola...</div>`;
            container.appendChild(div);
            taskQueue.push({ type: 'column', articleId: i, columnName: colName, cellId: cellId });
            totalTasks++;
          }
          for (let i = visibleCount; i < articlesData.length; i++) {
            const container = document.getElementById(`ai-container-${i}`);
            if (!container) continue;
            const meta = getColumnMeta(colName);
            const cellId = `cell-${i}-${colName}`;
            if (document.getElementById(cellId)) continue;
            const div = document.createElement('div');
            div.className = 'ai-cell'; div.id = cellId;
            div.innerHTML = `<h5><i class="${meta.icon} ${meta.color}"></i> ${meta.title}</h5><div style="color:var(--text-muted);font-size:0.7rem">Aparecerá al mostrar artículo...</div>`;
            container.appendChild(div);
          }
          processQueue();
        };

        window.translateAllAbstracts = function () {
          const btn = document.getElementById('btn-translate-all');
          btn.classList.add('active');
          btn.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500" style="margin-right:6px"></i> Procesando...';
          articlesData.forEach((art, idx) => {
            if (art.abstract && art.abstract.length > 20) { taskQueue.push({ type: 'translate', articleId: idx }); totalTasks++; }
          });
          processQueue();
        };

        async function processQueue() {
          if (taskQueue.length === 0 || activeTasks >= MAX_CONCURRENT_TASKS) { updateQueueUI(); return; }
          while (taskQueue.length > 0 && activeTasks < MAX_CONCURRENT_TASKS) {
            const task = taskQueue.shift(); activeTasks++; updateQueueUI("active");
            (async () => {
              try {
                if (task.type === 'column') await fetchAIColumn(task);
                if (task.type === 'translate') await fetchTranslation(task);
              } catch (e) { console.error("❌", e); }
              finally { activeTasks--; completedTasks++; processQueue(); }
            })();
          }
        }

        function updateQueueUI(state = "idle") {
          const dot = document.getElementById('agent-status-dot');
          const text = document.getElementById('queue-status');
          const bar = document.getElementById('queue-progress');
          if (taskQueue.length === 0 && activeTasks === 0) {
            dot.style.background = '#cbd5e1'; text.innerText = "Inactivo"; bar.style.width = "100%"; return;
          }
          dot.style.background = 'var(--green)'; dot.classList.add('animate-pulse');
          text.innerText = activeTasks > 0 ? `${activeTasks} hilos activos (${taskQueue.length} en espera)` : 'Preparando...';
          bar.style.width = `${totalTasks > 0 ? (completedTasks/totalTasks)*100 : 0}%`;
        }

        async function fetchAIColumn(task) {
          const cell = document.getElementById(task.cellId);
          if (!cell) return;
          cell.querySelector('div').innerHTML = `<div style="display:flex;align-items:center;gap:6px;color:var(--primary);font-size:0.75rem"><i class="fas fa-circle-notch fa-spin"></i> Procesando con IA...</div>`;
          try {
            const response = await fetch('/generate_column', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ article: articlesData[task.articleId], column_name: task.columnName, session_id: SESSION_ID, question: RESEARCH_QUESTION })
            });
            if (response.ok) {
              const data = await response.json();
              const cd = cell.querySelector('div');
              cd.className = ""; cd.style.cssText = "color:#475569;margin-top:6px;font-size:0.82rem;line-height:1.6";
              cd.innerHTML = data.value;
              if (!articlesData[task.articleId].ai_data) articlesData[task.articleId].ai_data = {};
              articlesData[task.articleId].ai_data[task.columnName] = data.value;
              if (data.is_pdf_downloaded) {
                const badge = document.getElementById(`pdf-badge-container-${task.articleId}`);
                if (badge && badge.innerText.includes("SIN PDF")) {
                  badge.className = "pdf-badge-ok";
                  badge.innerHTML = '<i class="fas fa-check-circle"></i> PDF LISTO';
                  articlesData[task.articleId].is_pdf_downloaded = true;
                }
              }
            } else if (response.status === 400) {
              cell.querySelector('div').innerHTML = `<div style="color:var(--red);font-size:0.7rem;background:var(--red-bg);padding:6px 8px;border-radius:6px;border:1px solid #fecaca;margin-top:4px"><i class="fas fa-clock"></i> Sesión expirada. <b>Recarga la página.</b></div>`;
              taskQueue = []; totalTasks = completedTasks; activeTasks = 0; updateQueueUI("idle");
              if (!window.sessionErrorAlerted) { alert("⚠️ Sesión expirada. Recarga la página."); window.sessionErrorAlerted = true; }
            } else { throw new Error(`HTTP ${response.status}`); }
          } catch (e) {
            cell.querySelector('div').innerHTML = `<div style="color:var(--amber);font-size:0.7rem;background:var(--amber-bg);padding:6px 8px;border-radius:6px;border:1px solid #fde68a;margin-top:4px"><i class="fas fa-exclamation-triangle"></i> No disponible (${e.message})</div>`;
            setTimeout(() => { if (cell.querySelector('div')?.innerText?.includes("No disponible")) { taskQueue.push(task); processQueue(); } }, 3000);
          }
        }

        async function fetchTranslation(task) {
          const box = document.getElementById(`translation-box-${task.articleId}`);
          if (!box) return;
          box.classList.remove('hidden');
          box.innerHTML = `<div style="margin-top:10px;padding:8px 12px;background:var(--blue-bg);border-radius:8px;color:var(--blue);font-size:0.75rem"><i class="fas fa-spinner fa-spin"></i> Traduciendo...</div>`;
          try {
            const response = await fetch('/translate_abstract', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ article_id: task.articleId, abstract: articlesData[task.articleId].abstract }) });
            if (response.ok) {
              const data = await response.json();
              box.style.cssText = "margin-top:10px;padding:10px 14px;background:var(--blue-bg);border-radius:8px;border-left:3px solid var(--blue)";
              box.innerHTML = `<strong style="color:#1d4ed8;font-size:0.7rem">[ES]</strong> <span style="color:#475569;font-size:0.82rem">${escapeHtml(data.translation)}</span>`;
              articlesData[task.articleId].translation = data.translation;
            } else { throw new Error(`HTTP ${response.status}`); }
          } catch (e) { box.innerHTML = `<span style="color:var(--red);font-size:0.7rem">Error de traducción</span>`; }
        }

        window.setDecision = function (id, decision) {
          const card = document.getElementById(`card-${id}`);
          if (!card) return;
          card.classList.remove('included', 'excluded');
          if (decision === 'included') { card.classList.add('included'); decisions.add(id); }
          else { card.classList.add('excluded'); decisions.delete(id); }
          document.getElementById('count-included').innerText = decisions.size;
        };

        window.submitScreening = async function () {
          if (decisions.size === 0) { if (!confirm("No has incluido ningún artículo. ¿Continuar?")) return; }
          const btn = document.querySelector('.btn-finish');
          btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
          let payload = { sessionId: SESSION_ID, question: RESEARCH_QUESTION, articles: {} };
          articlesData.forEach((art, idx) => {
            let status = 'pending';
            const card = document.getElementById(`card-${idx}`);
            if (card?.classList.contains('included')) status = 'included';
            if (card?.classList.contains('excluded')) status = 'excluded';
            payload.articles[idx] = { status, data: art, aiGeneratedFields: art.ai_data || {}, translation: art.translation || "" };
          });
          try {
            const res = await fetch('/submit_screening', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { const html = await res.text(); document.open(); document.write(html); document.close(); }
            else { throw new Error(`Error: ${res.status}`); }
          } catch (e) { alert(`Error: ${e.message}`); btn.disabled = false; btn.innerHTML = '<i class="fas fa-arrow-right"></i> Finalizar Revisión'; }
        };

        let currentUploadIndex = null;
        window.openUploadModal = function (index) { currentUploadIndex = index; document.getElementById('modal-article-title').innerText = articlesData[index].title; document.getElementById('uploadModal').style.display = 'block'; resetModal(); };
        window.closeUploadModal = function () { document.getElementById('uploadModal').style.display = 'none'; currentUploadIndex = null; };
        function resetModal() {
          document.getElementById('upload-form-area').classList.remove('hidden');
          document.getElementById('upload-loading').classList.add('hidden');
          document.getElementById('modal-footer').classList.remove('hidden');
          document.getElementById('btn-do-upload').disabled = true;
          document.getElementById('btn-do-upload').style.opacity = '0.5';
          document.getElementById('upload-text').innerText = "Haz clic o arrastra el PDF aquí";
          document.getElementById('upload-icon').className = "fas fa-cloud-upload-alt";
          document.getElementById('upload-icon').style.cssText = "font-size:2.5rem;color:#cbd5e1;margin-bottom:12px;display:block";
          document.getElementById('pdfFile').value = "";
        }
        window.handleFileSelect = function (input) {
          if (input.files && input.files[0]) {
            document.getElementById('upload-text').innerText = `Seleccionado: ${input.files[0].name}`;
            document.getElementById('upload-icon').className = "fas fa-file-pdf";
            document.getElementById('upload-icon').style.color = "var(--primary)";
            document.getElementById('btn-do-upload').disabled = false;
            document.getElementById('btn-do-upload').style.opacity = '1';
          }
        };
        window.doUpload = async function () {
          const fileInput = document.getElementById('pdfFile');
          if (!fileInput.files || !fileInput.files[0]) return;
          const formData = new FormData();
          formData.append('sessionId', SESSION_ID); formData.append('articleIndex', currentUploadIndex); formData.append('file', fileInput.files[0]);
          document.getElementById('upload-form-area').classList.add('hidden');
          document.getElementById('modal-footer').classList.add('hidden');
          document.getElementById('upload-loading').classList.remove('hidden');
          try {
            const response = await fetch('/upload_pdf', { method: 'POST', body: formData });
            if (response.ok) {
              const result = await response.json();
              alert("✅ " + result.message);
              articlesData[currentUploadIndex] = result.article;
              const bc = document.getElementById(`pdf-badge-container-${currentUploadIndex}`);
              if (bc) { bc.className = "pdf-badge-ok"; bc.innerHTML = `<i class="fas fa-file-pdf"></i> PDF LISTO (MANUAL)`; }
              const idx = currentUploadIndex;
              activeColumns.forEach(colName => {
                const meta = getColumnMeta(colName); const cellId = `cell-${idx}-${colName}`; const cell = document.getElementById(cellId);
                if (cell) { const d = cell.querySelector('div'); d.className = "text-slate-400 animate-pulse"; d.style.fontSize = "0.7rem"; d.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> En cola...`; }
                if (articlesData[idx].ai_data) delete articlesData[idx].ai_data[colName];
                taskQueue.push({ type: 'column', articleId: idx, columnName: colName, cellId }); totalTasks++;
              });
              processQueue(); closeUploadModal();
            } else { const err = await response.json(); alert("❌ " + (err.error || "Falla")); resetModal(); }
          } catch (e) { alert("❌ Error: " + e.message); resetModal(); }
        };

        document.addEventListener('DOMContentLoaded', function () {
          const success = loadArticles();
          if (success) renderArticles();
        });
      })();
    </script>
</body>
</html>
